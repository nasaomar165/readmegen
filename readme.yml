# .github/workflows/readme.yml
# Automatically regenerates README.md on every push to main.
#
# Setup:
#   1. Go to Settings → Secrets and variables → Actions
#   2. Add a secret named GROQ_API_KEY  (or swap for another provider below)
#      Free key at: https://console.groq.com
#   3. Commit this file — the workflow runs automatically.
#
# To use a different provider, change --provider and the env var:
#   --provider deepseek  →  DEEPSEEK_API_KEY
#   --provider kimi      →  KIMI_API_KEY
#   --provider glm       →  GLM_API_KEY
#   --provider gemini    →  GEMINI_API_KEY

name: Generate README

on:
  push:
    branches: [main, master]
    paths-ignore:
      - 'README.md'       # prevent infinite loop
  workflow_dispatch:       # allow manual runs from the Actions tab

permissions:
  contents: write

jobs:
  generate-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate README
        run: python readmegen.py . --provider groq --overwrite
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Commit updated README
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --staged --quiet || git commit -m "docs: auto-update README [skip ci]"
          git push
